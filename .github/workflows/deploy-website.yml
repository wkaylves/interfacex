name: Deploy Static Website

on:
  push:
    branches: [ main, master ]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:  # 允许手动触发

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: echo "No dependencies to install"

      - name: Build website
        run: |
          if [ -f docs/package.json ]; then
            cd docs && npm run build
          else
            # 如果没有构建脚本，直接复制静态文件
            mkdir -p _site/icons
            cp -r docs/* _site/ 2>/dev/null || true
            # 复制图标文件
            cp src/main/resources/icons/interfacex_icon.svg _site/icons/ 2>/dev/null || true
            cp src/main/resources/icons/interfacex_icon_32.png _site/icons/ 2>/dev/null || true
            # 复制 CHANGELOG.md 到 _site 目录供 JavaScript 加载
            cp CHANGELOG.md _site/CHANGELOG.md 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
          retention-days: 7

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
