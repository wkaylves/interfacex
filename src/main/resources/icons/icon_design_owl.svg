<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- 方案 3: 智慧猫头鹰 K - 知识守护者 -->
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="64" cy="64" r="60" fill="url(#grad3)"/>
  
  <!-- 猫头鹰耳朵 -->
  <polygon points="46,40 40,28 52,36" fill="#5B21B6"/>
  <polygon points="82,40 88,28 76,36" fill="#5B21B6"/>
  
  <!-- 猫头鹰身体 -->
  <ellipse cx="64" cy="66" rx="30" ry="26" fill="#7C3AED"/>
  
  <!-- 脸部盘 -->
  <ellipse cx="64" cy="60" rx="24" ry="20" fill="#A78BFA"/>
  
  <!-- 大眼睛 -->
  <circle cx="52" cy="56" r="10" fill="#FDE047"/>
  <circle cx="76" cy="56" r="10" fill="#FDE047"/>
  <circle cx="52" cy="56" r="6" fill="#1E293B"/>
  <circle cx="76" cy="56" r="6" fill="#1E293B"/>
  <circle cx="54" cy="54" r="3" fill="white"/>
  <circle cx="78" cy="54" r="3" fill="white"/>
  
  <!-- 小嘴巴 -->
  <polygon points="64,66 58,74 70,74" fill="#F97316"/>
  
  <!-- 字母 K (作为胸前的智慧标记) -->
  <text x="64" y="80" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        font-weight="bold"
        fill="#FDE047" 
        text-anchor="middle" 
        dominant-baseline="middle">K</text>
  
  <!-- 小翅膀 -->
  <ellipse cx="36" cy="70" rx="8" ry="12" fill="#5B21B6"/>
  <ellipse cx="92" cy="70" rx="8" ry="12" fill="#5B21B6"/>
</svg>
