<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- 方案 5: 机械猫咪 - 科技机器猫 -->
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94A3B8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#64748B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="64" cy="64" r="60" fill="url(#grad5)"/>
  
  <!-- 机械猫耳朵 -->
  <polygon points="46,42 40,28 54,36" fill="url(#metal)"/>
  <polygon points="82,42 88,28 74,36" fill="url(#metal)"/>
  <line x1="43" y1="35" x2="51" y2="39" stroke="#1E293B" stroke-width="1"/>
  <line x1="85" y1="35" x2="77" y2="39" stroke="#1E293B" stroke-width="1"/>
  
  <!-- 机械脸部 -->
  <rect x="42" y="42" width="44" height="40" rx="8" fill="url(#metal)"/>
  
  <!-- 机械眼睛 -->
  <circle cx="54" cy="54" r="6" fill="#0EA5E9"/>
  <circle cx="74" cy="54" r="6" fill="#0EA5E9"/>
  <circle cx="54" cy="54" r="3" fill="#7DD3FC"/>
  <circle cx="74" cy="54" r="3" fill="#7DD3FC"/>
  
  <!-- 字母 K (作为机械嘴巴) -->
  <text x="64" y="72" 
        font-family="Arial, sans-serif" 
        font-size="20" 
        font-weight="bold"
        fill="#1E293B" 
        text-anchor="middle" 
        dominant-baseline="middle">K</text>
  
  <!-- 机械胡须 -->
  <line x1="38" y1="62" x2="50" y2="64" stroke="#FCD34D" stroke-width="2"/>
  <line x1="38" y1="66" x2="50" y2="66" stroke="#FCD34D" stroke-width="2"/>
  <line x1="38" y1="70" x2="50" y2="68" stroke="#FCD34D" stroke-width="2"/>
  <line x1="90" y1="62" x2="78" y2="64" stroke="#FCD34D" stroke-width="2"/>
  <line x1="90" y1="66" x2="78" y2="66" stroke="#FCD34D" stroke-width="2"/>
  <line x1="90" y1="70" x2="78" y2="68" stroke="#FCD34D" stroke-width="2"/>
</svg>
