<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!-- InterfaceX 16x16 标准尺寸图标 -->
  <defs>
    <linearGradient id="grad16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆角背景 -->
  <rect x="1" y="1" width="14" height="14" rx="3" ry="3" fill="url(#grad16)"/>
  
  <!-- 中心 X 符号 -->
  <line x1="5" y1="5" x2="11" y2="11" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="5" x2="5" y2="11" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 四个角的连接点 -->
  <circle cx="4" cy="4" r="1" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="12" cy="4" r="1" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="4" cy="12" r="1" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="12" cy="12" r="1" fill="#FFFFFF" opacity="0.8"/>
</svg>
