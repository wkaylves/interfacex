<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- 方案 2: 小狐狸 K - 聪明的代码狐狸 -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="64" cy="64" r="60" fill="url(#grad2)"/>
  
  <!-- 狐狸耳朵 -->
  <polygon points="48,45 42,30 58,38" fill="#1E293B"/>
  <polygon points="80,45 86,30 70,38" fill="#1E293B"/>
  <polygon points="50,43 46,34 56,39" fill="#FCA5A5"/>
  <polygon points="78,43 82,34 72,39" fill="#FCA5A5"/>
  
  <!-- 狐狸脸部 -->
  <ellipse cx="64" cy="58" rx="28" ry="24" fill="#F97316"/>
  <ellipse cx="64" cy="58" rx="24" ry="20" fill="#FED7AA"/>
  
  <!-- 眼睛 -->
  <ellipse cx="54" cy="52" rx="5" ry="6" fill="#1E293B"/>
  <ellipse cx="74" cy="52" rx="5" ry="6" fill="#1E293B"/>
  <circle cx="55" cy="50" r="2" fill="white"/>
  <circle cx="75" cy="50" r="2" fill="white"/>
  
  <!-- 字母 K (作为鼻子和嘴巴区域) -->
  <text x="64" y="70" 
        font-family="Arial, sans-serif" 
        font-size="22" 
        font-weight="bold"
        fill="#1E293B" 
        text-anchor="middle" 
        dominant-baseline="middle">K</text>
  
  <!-- 小鼻子 -->
  <ellipse cx="64" cy="62" rx="4" ry="3" fill="#1E293B"/>
</svg>
