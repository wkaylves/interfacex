<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- 方案 6: 小龙 K - 中国风技术龙 -->
  <defs>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991B1B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="64" cy="64" r="60" fill="url(#grad6)"/>
  
  <!-- 龙角 -->
  <path d="M 48,44 Q 42,32 38,36 Q 42,40 46,42" fill="#FCD34D"/>
  <path d="M 80,44 Q 86,32 90,36 Q 86,40 82,42" fill="#FCD34D"/>
  
  <!-- 龙头 -->
  <ellipse cx="64" cy="56" rx="26" ry="22" fill="#DC2626"/>
  <ellipse cx="64" cy="56" rx="22" ry="18" fill="#F87171"/>
  
  <!-- 龙须 -->
  <path d="M 58,42 Q 54,32 58,26" stroke="#FCD34D" stroke-width="2" fill="none"/>
  <path d="M 70,42 Q 74,32 70,26" stroke="#FCD34D" stroke-width="2" fill="none"/>
  <circle cx="58" cy="24" r="3" fill="#FCD34D"/>
  <circle cx="70" cy="24" r="3" fill="#FCD34D"/>
  
  <!-- 龙眼 -->
  <ellipse cx="52" cy="52" rx="5" ry="6" fill="#1E293B"/>
  <ellipse cx="76" cy="52" rx="5" ry="6" fill="#1E293B"/>
  <circle cx="53" cy="50" r="2" fill="white"/>
  <circle cx="77" cy="50" r="2" fill="white"/>
  
  <!-- 字母 K (作为龙嘴) -->
  <text x="64" y="68" 
        font-family="Arial, sans-serif" 
        font-size="22" 
        font-weight="bold"
        fill="#FCD34D" 
        text-anchor="middle" 
        dominant-baseline="middle">K</text>
  
  <!-- 龙须飘带 -->
  <path d="M 50,72 Q 44,76 48,82" stroke="#FCD34D" stroke-width="2" fill="none"/>
  <path d="M 78,72 Q 84,76 80,82" stroke="#FCD34D" stroke-width="2" fill="none"/>
</svg>
